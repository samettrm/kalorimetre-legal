<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Kalorimetre — Aile Daveti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #16A34A 0%, #15803D 100%);
      color: #fff; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px; text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border-radius: 24px; padding: 36px 28px; max-width: 420px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .emoji { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 15px; line-height: 1.5; opacity: 0.95; margin-bottom: 20px; }
    .code {
      font-size: 34px; font-weight: 900; letter-spacing: 8px;
      background: rgba(255,255,255,0.2); border-radius: 14px;
      padding: 16px; margin-bottom: 24px;
    }
    .btn {
      display: block; background: #fff; color: #15803D; text-decoration: none;
      font-weight: 800; font-size: 17px; padding: 16px; border-radius: 14px;
      margin-bottom: 12px;
    }
    .store { display: flex; gap: 10px; margin-top: 16px; }
    .store a {
      flex: 1; background: rgba(0,0,0,0.25); color: #fff; text-decoration: none;
      font-size: 13px; font-weight: 700; padding: 12px; border-radius: 12px;
    }
    .hint { font-size: 12px; opacity: 0.8; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Kalorimetre Premium Ailesine Davet</h1>
    <p>Aşağıdaki kod ile premium özelliklere ücretsiz katıl:</p>
    <div class="code" id="code">······</div>
    <a class="btn" id="open" href="#">📱 Uygulamada Aç</a>
    <p style="font-size:13px; margin-bottom:0;">Uygulama yüklü değil mi? İndir:</p>
    <div class="store">
      <a href="https://apps.apple.com/app/id6775187463">App Store</a>
      <a href="https://play.google.com/store/apps/details?id=com.kalorimetre.app">Google Play</a>
    </div>
    <p class="hint">Uygulamada: Profil → Aile Planı → kodu gir.</p>
  </div>
  <script>
    var code = (new URLSearchParams(location.search).get('code') || '').toUpperCase();
    if (code) {
      document.getElementById('code').textContent = code;
      var deep = 'kalorimetre://family?code=' + encodeURIComponent(code);
      document.getElementById('open').href = deep;
      // Uygulamayı otomatik açmayı dene (yüklüyse)
      setTimeout(function () { window.location.href = deep; }, 700);
    }
  </script>
</body>
</html>
